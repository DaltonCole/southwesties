description: >- # this means to ignore newlines until "baseurl:"
  Albuquerque West Coast Swing Dancing
baseurl: "" # the subpath of your site, e.g. /blog
drafturl: "/46137729c05b852e448e44692b110e58"
url: "https://southwestiesabq.com" # the base hostname & protocol for your site, e.g. http://example.com
facebook_url: "https://www.facebook.com/southwestiesabq/"
address: "P.O. Box 50611, Albuquerque NM, 87181"

# Build settings
markdown: kramdown
theme: minima
# plugins:

collections:
  events:
    output: true
    permalink: /:collection/:title:output_ext
  
